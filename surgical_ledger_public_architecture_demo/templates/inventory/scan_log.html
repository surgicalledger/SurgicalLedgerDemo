{% extends "base.html" %}
{% block content %}
<h1>Scan Log</h1>
<table><tr><th>Time</th><th>Direction</th><th>Item</th><th>Qty</th></tr>
{% for event in events %}<tr><td>{{ event.scanned_at }}</td><td>{{ event.direction }}</td><td>{{ event.item }}</td><td>{{ event.qty_delta }}</td></tr>{% endfor %}
</table>
{% endblock %}
